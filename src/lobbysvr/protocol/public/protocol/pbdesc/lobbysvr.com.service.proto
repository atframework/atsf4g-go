syntax = "proto3";
// 前后台通信协议定义

option optimize_for = SPEED;
// option optimize_for = LITE_RUNTIME;
// option optimize_for = CODE_SIZE;
// --cpp_out=lite:,--cpp_out=
option cc_enable_arenas = true;
option cc_generic_services = true;

option go_package = "github.com/atframework/atsf4g-go/service-lobbysvr/protocol/public/protocol/pbdesc";

import "google/protobuf/empty.proto";

import "protocol/extension/atframework.proto";

import "protocol/pbdesc/lobbysvr.com.protocol.user.proto";
import "protocol/pbdesc/lobbysvr.com.protocol.quest.proto";
import "protocol/pbdesc/lobbysvr.com.protocol.activate.proto";
import "protocol/pbdesc/lobbysvr.com.protocol.mall.proto";
import "protocol/pbdesc/lobbysvr.com.protocol.mail.proto";
import "protocol/pbdesc/lobbysvr.com.protocol.module.unlock.proto";

package proy;

service LobbyClientService {
  /////////////////////////// user /////////////////////////////
  rpc login_auth(CSLoginAuthReq) returns (SCLoginAuthRsp) {
    option (atframework.rpc_options) = {
      module_name: "user"
      api_name: "Authorization"
    };
  };

  rpc login(CSLoginReq) returns (SCLoginRsp) {
    option (atframework.rpc_options) = {
      module_name: "user"
      api_name: "Login"
    };
  };

  rpc ping(CSPingReq) returns (SCPongRsp) {
    option (atframework.rpc_options) = {
      module_name: "user"
      api_name: "Ping/pong"
    };
  };

  rpc access_update(CSAccessUpdateReq) returns (SCAccessUpdateRsp) {
    option (atframework.rpc_options) = {
      module_name: "user"
      api_name: "Update access token"
    };
  };

  rpc user_get_info(CSUserGetInfoReq) returns (SCUserGetInfoRsp) {
    option (atframework.rpc_options) = {
      module_name: "user"
      api_name: "Get user data"
    };
  };

  rpc user_send_gm_command(CSUserGMCommandReq) returns (SCUserGMCommandRsp) {
    option (atframework.rpc_options) = {
      module_name: "user"
      api_name: "GM command"
    };
  };

  rpc user_update_client_option(CSUserUpdateClientOptionReq) returns (SCUserUpdateClientOptionRsp) {
    option (atframework.rpc_options) = {
      module_name: "user"
      api_name: "Update user options"
    };
  };

  rpc user_use_item(CSUserUseItemReq) returns (SCUserUseItemRsp) {
    option (atframework.rpc_options) = {
      module_name: "user"
      api_name: "Use item"
    };
  };

  // Use stream request to disable waiting for response
  rpc user_dirty_chg_sync(google.protobuf.Empty) returns (stream SCUserDirtyChgSync) {
    option (atframework.rpc_options) = {
      module_name: "user"
      api_name: "Push dirty data"
    };
  };

  rpc user_rename(CSUserRenameReq) returns (SCUserRenameRsp) {
    option (atframework.rpc_options) = {
      module_name: "user"
      api_name: "Rename user"
    };
  };

  rpc user_edit_profile(CSUserEditProfileReq) returns (SCUserEditProfileRsp) {
    option (atframework.rpc_options) = {
      module_name: "user"
      api_name: "Edit user profile"
    };
  };
  /////////////////////////// user /////////////////////////////

  /////////////////////////// quest /////////////////////////////
  rpc quest_receive_reward(CSQuestReceiveRewardReq) returns (SCQuestReceiveRewardRsp) {
    option (atframework.rpc_options) = {
      module_name: "quest"
      api_name: "领取任务奖励"
    };
  };

  rpc quest_update_status(CSQuestUpdateStatusReq) returns (SCQuestUpdateStatusRsp) {
    option (atframework.rpc_options) = {
      module_name: "quest"
      api_name: "客户群请求更新任务状态"
    };
  };
  /////////////////////////// quest /////////////////////////////

  /////////////////////////// activate /////////////////////////////
  rpc user_activate(CSUserActivateReq) returns (SCUserActivateRsp) {
    option (atframework.rpc_options) = {
      module_name: "activate"
      api_name: "用户激活"
    };
  };
  /////////////////////////// activate /////////////////////////////
  /////////////////////////// mall /////////////////////////////
  rpc mall_purchase(CSMallPurchaseReq) returns (SCMallPurchaseRsp) {
    option (atframework.rpc_options) = {
      module_name: "mall"
      api_name: "购买商品"
    };
  };
  /////////////////////////// mall /////////////////////////////
  /////////////////////////// mail /////////////////////////////
  rpc mail_get_all(CSMailGetAllReq) returns (SCMailGetAllRsp) {
    option (atframework.rpc_options) = {
      module_name: "mail"
      api_name: "拉取邮件详情"
    };
  };
  rpc mail_read(CSMailReadReq) returns (SCMailReadRsp) {
    option (atframework.rpc_options) = {
      module_name: "mail"
      api_name: "读取邮件"
    };
  };
  rpc mail_read_all(CSMailReadAllReq) returns (SCMailReadAllRsp) {
    option (atframework.rpc_options) = {
      module_name: "mail"
      api_name: "全部已读邮件"
    };
  };
  rpc mail_receive_attachments_all(CSMailReceiveAttachmentsAllReq) returns (SCMailReceiveAttachmentsAllRsp) {
    option (atframework.rpc_options) = {
      module_name: "mail"
      api_name: "领取所有邮件附件"
    };
  };
  rpc mail_receive_attachments(CSMailReceiveAttachmentsReq) returns (SCMailReceiveAttachmentsRsp) {
    option (atframework.rpc_options) = {
      module_name: "mail"
      api_name: "领取邮件附件"
    };
  };
  // Use stream request to disable waiting for response
  rpc mail_change_sync(google.protobuf.Empty) returns (stream SCMailChangeSync) {
    option (atframework.rpc_options) = {
      module_name: "mail"
      api_name: "Push mail change sync"
    };
  };
  /////////////////////////// mail /////////////////////////////

  /////////////////////////// module_unlock /////////////////////////////
  rpc module_unlock_received_reward(CSModuleUnlockReceivedRewardReq) returns (SCModuleUnlockReceivedRewardRsp) {
    option (atframework.rpc_options) = {
      module_name: "module_unlock"
      api_name: "领取模块解锁奖励"
    };
  };
  /////////////////////////// module_unlock /////////////////////////////
}
