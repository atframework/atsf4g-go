syntax = "proto3";
// 任务相关协议定义

option optimize_for = SPEED;
// option optimize_for = LITE_RUNTIME;
// option optimize_for = CODE_SIZE;
// --cpp_out=lite:,--cpp_out=
option cc_enable_arenas = true;
option cc_generic_services = true;

option go_package = "github.com/atframework/atsf4g-go/service-lobbysvr/protocol/public/protocol/pbdesc";

import "protocol/pbdesc/com.struct.mail.proto";
import "protocol/common/com.struct.item.common.proto";

package proy;

message CSMailGetAllReq {
  int32 major_type = 1;
  int32 start_index = 4;  // 从第几条开始获取 从0开始
  int32 count = 5;        // 获取多少条
}

message SCMailGetAllRsp {
  repeated DMailContent mails = 1;
  int32 mail_count = 4;  // 总邮件数量
  int32 major_type = 5;
  int32 start_index = 6;
  int32 count = 7;
}

message CSMailReadReq {
  repeated int64 mail_ids = 1;
  bool need_remove = 2;
}

message SCMailReadRsp {
  repeated DMailOperationResult mails = 1;
}

message CSMailReadAllReq {
  int32 major_type = 1;  // 全部已读必须设置邮件大类型, @see EnMailMajorType
  int32 minor_type = 2;  // 全部已读可选设置邮件小类型，留空则视为全部
  bool need_remove = 3;
}

message SCMailReadAllRsp {
  repeated DMailOperationResult mails = 1;
}

message CSMailReceiveAttachmentsAllReq {
  int32 major_type = 1;  // 全部领取必须设置邮件大类型, @see EnMailMajorType
  int32 minor_type = 2;  // 全部领取可选设置邮件小类型，留空则视为全部
  bool need_remove = 3;
}

message SCMailReceiveAttachmentsAllRsp {
  repeated DItemOffset received_items = 1;
}

message CSMailReceiveAttachmentsReq {
  repeated int64 mail_ids = 1;
  bool need_remove = 2;
}

message SCMailReceiveAttachmentsRsp {
  repeated DItemOffset received_items = 1;
}

message SCMailChangeSync {
  repeated DMailRecord mails = 1;       // 邮件变更、删除、已读、已领取通知
  repeated DMailContent new_mails = 2;  // 新邮件通知
  bool mail_red_point = 3;              // 邮件红点数据
}
