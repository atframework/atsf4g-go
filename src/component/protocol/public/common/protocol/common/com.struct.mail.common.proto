syntax = "proto3";

option optimize_for = SPEED;
// option optimize_for = LITE_RUNTIME;
// option optimize_for = CODE_SIZE;
// --cpp_out=lite:,--cpp_out=
option cc_enable_arenas = true;

option go_package = "github.com/atframework/atsf4g-go/component-protocol-public/common/protocol/common";

import "google/protobuf/timestamp.proto";

import "protocol/extension/v3/xresloader.proto";
import "protocol/common/com.struct.item.common.proto";
package proy;

enum EnMailStatusType {
  EN_MAIL_STATUS_NONE = 0;
  EN_MAIL_STATUS_READ = 1;              // 已读
  EN_MAIL_STATUS_TOKEN_ATTACHMENT = 2;  // 已领取
  EN_MAIL_STATUS_REMOVED = 4;           // 已移除
}

enum EnMailMajorType {
  EN_MAIL_MAJOR_INVALID = 0;
  EN_MAIL_MAJOR_SYSTEM_PAY = 1;           // 系统邮件-支付系统
  EN_MAIL_MAJOR_SYSTEM_ANNOUNCEMENT = 2;  // 系统邮件-特殊公告
  EN_MAIL_MAJOR_SYSTEM_LOGIC = 3;         // 系统邮件-业务逻辑
  EN_MAIL_MAJOR_SYSTEM_OPERATIONS = 4;    // 系统邮件-运营邮件

  EN_MAIL_MAJOR_BUSINESS_BOUND = 20;  // 特定功能性邮件大类的边界
}

message DMailTemplate {
  int32 major_type = 1 [(org.xresloader.validator) = "proy.EnMailMajorType"];  // 主要类型
  int32 minor_type = 2;                                                        // 次要类型
  bool is_admin_sender = 3;                                                    // 是否管理员发送
  string title = 4;                                                            // 标题
  string content = 5;                                                          // 正文
  int32 expired_duration_s = 6;                                                // 有效期(秒)
  google.protobuf.Timestamp show_time = 7;                                     // 展示时间
  google.protobuf.Timestamp start_time = 8;                                    // 开始时间
  google.protobuf.Timestamp expired_time = 9;                                  // 过期时间
  bool is_padding_expired_time = 10;                                           // 过期时间对齐到天
  int32 resolve_expired_time = 11;                                             // 按实际接收时间重算有效期（天）
  int32 condition_id = 12;                                                     // 限制条件组ID

  repeated DItemOffset attachments = 21 [(org.xresloader.field_separator) = ";"];  // 附件
  bool keep_after_take_attachments = 22;                                           // 领取附件后保留
}