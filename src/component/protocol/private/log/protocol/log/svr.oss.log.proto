syntax = "proto3";

option optimize_for = SPEED;
// option optimize_for = LITE_RUNTIME;
// option optimize_for = CODE_SIZE;
// --cpp_out=lite:,--cpp_out=
option cc_enable_arenas = true;

option go_package = "github.com/atframework/atsf4g-go/component/protocol/private/log/protocol/log";

import "protocol/common/com.struct.item.common.proto";
import "protocol/pbdesc/com.struct.proto";

package proy;

// 上报后不允许更改字段名字

message OperationSupportSystemLogBasicInfo {
  string app_id = 1;
  uint64 user_id = 2;
  uint32 zone_id = 3;
  string open_id = 4;
}

message OperationSupportSystemLog {
  string log_type = 1;
  OperationSupportSystemLogBasicInfo basic = 2;
  OperationSupportSystemLogDetail log = 3;
}

message OperationSupportSystemLogDetail {
  oneof log {
    OSSItemFlow item_flow = 10;
    OSSLoginClientBeginFlow login_client_begin_flow = 11;
    OSSLoginServerBeginFlow login_server_begin_flow = 12;
    OSSLoginFlow login_flow = 13;
    OSSLogoutFlow logout_flow = 14;
    OSSOnlineFlow online_flow = 15;
    OSSUserRegisterFlow user_register_flow = 16;
    OSSUserLevelChangeFlow user_level_change_flow = 17;
    OSSMailUserSendMailFlow mail_user_send_mail_flow = 19;                    // 用户发送邮件流水
    OSSMailUserReadMailFlow mail_user_read_mail_flow = 20;                    // 用户阅读邮件流水
    OSSMailUserReceiveAttachmentFlow mail_user_receive_attachment_flow = 21;  // 用户领取邮件附件流水
    OSSMailUserRemoveMailFlow mail_user_remove_mail_flow = 22;                // 用户删除邮件流水
    OSSUserSendMailFailedFlow user_send_mail_failed_flow = 23;                // 用户发送邮件失败流水
    OSSMailGlobalSendMailFlow mail_global_send_mail_flow = 24;                // 全局发送邮件流水
    OSSMailGlobalRemoveMailFlow mail_global_remove_mail_flow = 25;            // 全局删除邮件流水
    OSSGlobalSendMailFailedFlow global_send_mail_failed_flow = 26;            // 全局发送邮件失败流水
    OSSQuestFlow quest_flow = 27;                                             // 任务流水
    OSSRenameFlow rename_flow = 28;                                           // 改名流水
  }
}

message OSSItemFlow {
  int32 item_id = 1;
  enum EnOSSItemFlowOperationType {
    EN_OSS_ITEM_FLOW_OPERATION_TYPE_INVALID = 0;
    EN_OSS_ITEM_FLOW_OPERATION_TYPE_ADD = 1;
    EN_OSS_ITEM_FLOW_OPERATION_TYPE_SUB = 2;
    EN_OSS_ITEM_FLOW_OPERATION_TYPE_USE = 3;
  }
  EnOSSItemFlowOperationType operation_type = 2;
  int64 operation_count = 3;
  int64 after_count = 4;
  int32 result = 5;

  EnItemFlowReasonMajorType major_reason = 11;
  EnItemFlowReasonMinorType minor_reason = 12;
  int64 parameter = 13;
}

message OSSLoginClientBeginFlow {
  // 客户端尝试开始登录
}

message OSSLoginServerBeginFlow {
  // 服务器尝试开始登录
}

message OSSLoginFlow {
  // 登录成功
  DClientDeviceInfo device_info = 1;
  bool is_new_user = 2;  // 是否新用户
  string user_name = 3;
}

message OSSLogoutFlow {
  // 登出
  int64 login_time = 1;       // 登录时间，单位秒
  int64 logout_time = 2;      // 登录时间，单位秒
  int64 online_duration = 3;  // 在线时长，单位秒
}

message OSSOnlineFlow {
  int32 online_count = 1;
}

message OSSUserRegisterFlow {
  // 用户注册
}

message OSSUserLevelChangeFlow {
  // 用户等级变化
  int32 before_level = 1;
  int32 after_level = 2;
}

message OSSMailMailBaseInfo {
  int64 mail_id = 1;
  int32 major_type = 2;
  int32 minor_type = 3;
  uint64 sender_user_id = 4;
  int32 channel_type = 5;
  int64 channel_parameter = 6;
  int32 major_reason = 7;
  int32 minor_reason = 8;
  int64 reason_param = 9;
  int32 flags = 10;

  repeated DItemOffset item_offset_list = 101;
}

message OSSMailUserSendMailFlow {
  OSSMailMailBaseInfo base_info = 1;
}

message OSSMailUserReadMailFlow {
  OSSMailMailBaseInfo base_info = 1;
  bool is_removed = 11;  // 是否被删除
}

message OSSMailUserReceiveAttachmentFlow {
  OSSMailMailBaseInfo base_info = 1;
  bool is_removed = 11;  // 是否被删除
  int32 result = 12;     // 领取结果
}

message OSSMailUserRemoveMailFlow {
  int64 mail_id = 1;
}

message OSSUserSendMailFailedFlow {
  OSSMailMailBaseInfo base_info = 1;

  int32 reason = 11;  // 失败原因
}

message OSSMailGlobalSendMailFlow {
  OSSMailMailBaseInfo base_info = 1;
}

message OSSMailGlobalRemoveMailFlow {
  int64 mail_id = 1;
}

message OSSGlobalSendMailFailedFlow {
  OSSMailMailBaseInfo base_info = 1;

  int32 reason = 11;  // 失败原因
}

message OSSQuestProgressData {
  int64 id = 1;
  int64 value = 2;
}

message OSSQuestFlow {
  int32 quest_id = 1;
  int32 quest_type = 2;
  int32 quest_status = 3;
  repeated OSSQuestProgressData progress_list = 4;
}

message OSSRenameFlow {
  string before_name = 1;
  string after_name = 2;
}