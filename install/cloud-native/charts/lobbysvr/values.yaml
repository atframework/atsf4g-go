# Default values for lobby.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

proc_name: lobbysvrd

type_name: "lobbysvr"

image:
  repository: harbor.m-oa.com:6023/project-y/project-y-server
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: latest
  secrets: harbor-regcred

volumeMounts:
  configMountPath: /etc/projecty/lobbysvr/cfg
  logMountPath: /data/projecty/lobbysvr/log

extraVolumes:
  - name: opt
    emptyDir: {}
    mountPath: /opt/projecty/lobbysvr

vector:
  enabled: true
  log_path: /data/projecty/lobbysvr/log
  source:
    - name: crash
      include_pattern: "*.crash.log"
      ignore_older_secs: 3600
      line_delimiter: "\n"
      remap:
        parse_type: crash
      sinks:
        sink_name: crash
        opensearch:
          dataset: log
          namespace: crash
        kafka:
          logstore: project-y-cn-shanghai-crash.json
    - name: normal
      include_pattern: "*.normal.all.*.log"
      ignore_older_secs: 600
      line_delimiter: "\u001e\n"
      remap:
        parse_type: normal
        index:
          - "user_id"
          - "task_name"
          - "zone_id"
          - "response_code"
      sinks:
        sink_name: running
        opensearch:
          dataset: log
          namespace: running
    - name: db_inner
      include_pattern: "*.db_inner.all.*.log"
      ignore_older_secs: 600
      line_delimiter: "\u001e\n"
      remap:
        parse_type: normal
      sinks:
        sink_name: running
        opensearch:
          dataset: log
          namespace: running
    - name: redis
      include_pattern: "*.redis.all.*.log"
      ignore_older_secs: 600
      line_delimiter: "\u001e\n"
      remap:
        parse_type: normal
      sinks:
        sink_name: running
        opensearch:
          dataset: log
          namespace: running
    - name: actor
      include_pattern: "/*/*-*.*.log"
      ignore_older_secs: 600
      line_delimiter: "\u001e\n"
      remap:
        parse_type: actor
      sinks:
        sink_name: actor
        opensearch:
          dataset: log
          namespace: actor
    - name: mon
      include_pattern: "*.mon.*.log"
      ignore_older_secs: 3600
      line_delimiter: "\u001e\n"
      remap:
        parse_type: oss
      sinks:
        sink_name: mon
        opensearch:
          dataset: mon
          namespace: all
        kafka:
          logstore: project-y-cn-shanghai-mon-{{ log_type }}.json
    - name: oss
      include_pattern: "*.oss.*.log"
      ignore_older_secs: 3600
      line_delimiter: "\u001e\n"
      remap:
        parse_type: oss
      sinks:
        sink_name: oss
        opensearch:
          dataset: oss
          namespace: "type-{{ log_type }}"
        kafka:
          logstore: project-y-cn-shanghai-oss-{{ log_type }}.json

persistence:
  cbs:
    enabled: true
    storageClass: openebs-hostpath
    volumes:
      - name: log
        storage: 5Gi
        accessMode: ReadWriteOnce

gateway:
  class: cilium
  port: 7001
  hostname: gateway.example.com
  addresses_ip: 127.0.0.1

httproute:
  enabled: true
  port: 7001
  parentRefsName: project-y-tls-gateway

ingress:
  enabled: false
  class: cilium
  port: 7001
  hostname: ingress.example.com
  addresses_ip: 127.0.0.1

service:
  type: ClusterIP
  port: 7001
  targetPort: 7001
  protocol: TCP

redis:
  enabled: true

autoscaling:
  enabled: true

resources:
  enabled: true

webserver:
  port: 7001

# websocket:
# websocket 路径片段 实际路径为 /<deployment_environment>/daily/ws/v1
# path: daily

lobbysvr:
  # 是否启用GM功能
  enable_gm: true
  # GM功能白名单，在enable_gm为false时,以白名单账户允许GM
  gm_white_list: []
  # 是否启用战斗验证功能
  enable_battle_validation: false
  # 认证配置
  auth:
    allow_no_auth: true
    weak_token_timeout: 14d
    weak_token_max_count: 10
    argon2:
      # argon2内存参数，单位KB，默认64MB
      memory: 65536
      # argon2迭代次数，默认3
      iterations: 3
      # argon2并行度，默认2
      parallelism: 2
      # argon2盐值长度，单位KB，默认16B
      salt_length: 16
      # argon2密钥长度，单位KB，默认32B
      key_length: 32
  http_client:
    timeout: 10s

log_level: DEBUG
